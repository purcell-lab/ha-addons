# HA Add-on build configuration
#
# Switched from Alpine/musl base-python to Debian/glibc base-debian so that
# manylinux wheels for scikit-learn, lightgbm, and darts install cleanly.
# Alpine has no published musllinux wheels for sklearn/lightgbm and the HA
# base-python image ships without a C toolchain, so source builds fail.
#
# armv7 is intentionally not built: the modern ML stack (sklearn 1.9 +
# lightgbm + darts) is impractical on 32-bit ARM and the dated bookworm tag
# is not published for that arch.
build_from:
  amd64: "ghcr.io/home-assistant/amd64-base-debian:bookworm-2026.02.0"
  aarch64: "ghcr.io/home-assistant/aarch64-base-debian:bookworm-2026.02.0"
