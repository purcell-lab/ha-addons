# HA Add-on build configuration
# Pinned to actively maintained ghcr.io base images (the docker.io/homeassistant
# base-python images stopped publishing new tags in 2023). Python 3.12 on
# Alpine 3.20 is the latest published tag at time of writing.
build_from:
  aarch64: "ghcr.io/home-assistant/aarch64-base-python:3.12-alpine3.20"
  amd64: "ghcr.io/home-assistant/amd64-base-python:3.12-alpine3.20"
  armv7: "ghcr.io/home-assistant/armv7-base-python:3.12-alpine3.20"
